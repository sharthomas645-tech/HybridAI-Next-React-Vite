<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HybridAI Dashboard</title>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
color:white;
background:#020617;
overflow-x:hidden;
}

/* ---------------- AURORA 3D BACKGROUND ---------------- /

.aurora3d{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.layer{
position:absolute;
width:140%;
height:140%;
filter:blur(90px);
opacity:.75;
mix-blend-mode:screen;
animation:auroraMove 45s infinite alternate ease-in-out;
}

.layer1{
background:radial-gradient(circle,#4cc9f0 0%,transparent 60%);
top:-20%;
left:-10%;
animation-duration:40s;
}

.layer2{
background:radial-gradient(circle,#7209b7 0%,transparent 60%);
top:30%;
left:40%;
animation-duration:50s;
}

.layer3{
background:radial-gradient(circle,#4361ee 0%,transparent 60%);
top:60%;
left:-20%;
animation-duration:60s;
}

@keyframes auroraMove{

0%{
transform:translate3d(0,0,0) scale(1);
}

50%{
transform:translate3d(120px,-60px,80px) scale(1.2);
}

100%{
transform:translate3d(-80px,80px,-50px) scale(1.1);
}

}

/ ---------------- HEADER ---------------- /

.header{
text-align:center;
padding-top:40px;
}

.logo{

font-size:54px;
font-weight:700;

background:linear-gradient(90deg,#6ae1ff,#8a6bff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 15px rgba(120,180,255,.9),
0 0 40px rgba(140,100,255,.6);

}

.subtitle{
font-size:20px;
opacity:.9;
margin-top:6px;
}

/ ---------------- PANEL ---------------- /

.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/ ---------------- BUTTONS ---------------- /

.button-row{
display:flex;
gap:20px;
margin-bottom:40px;
}

button{

flex:1;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;

background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;

box-shadow:0 0 15px rgba(120,120,255,.5);

transition:.3s;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 0 35px rgba(150,130,255,1);

}

/ ---------------- CARDS ---------------- /

.cards{

display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;

}

.card{

background:rgba(255,255,255,.05);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);

}

.card h3{

color:#9fb7ff;
margin-bottom:15px;

}

/ ---------------- STATUS ---------------- /

.status span{

display:block;
padding:7px;
margin:6px 0;
border-radius:6px;
color:#8fb6ff;

}

/ highlighted status /

.active{

background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(130,130,255,.9);

}

/ ---------------- METRICS ---------------- /

.metric{

font-size:42px;
font-weight:700;
text-align:center;
margin-top:10px;

}

.alert{

color:#ff4d6d;

}

</style>
</head>

<body>

<div class="aurora3d">
<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>
</div>

<div class="header">

<div class="logo">HybridAI</div>

<div class="subtitle">
Medical Chronology Builder & Analyzer
</div>

</div>

<div class="panel">

<div class="button-row">

<button>Upload PDF</button>

<button>Build Chronology</button>

<button>RN Review Request</button>

<button>Export Files</button>

</div>

<div class="cards">

<div class="card">

<h3>Case Status</h3>

<div class="status">

<span class="active">Uploaded</span>
<span>Processing</span>
<span>Under RN Review</span>
<span>Ready for Export</span>

</div>

</div>

<div class="card">

<h3>High-Risk Alerts</h3>

<div class="metric alert">2</div>

</div>

<div class="card">

<h3>Cases Uploaded</h3>

<div class="metric">5</div>

</div>

</div>

</div>

<script>

/ 3D PARALLAX EFFECT */

document.addEventListener("mousemove", (e) => {

const x = (window.innerWidth / 2 - e.pageX) / 40
const y = (window.innerHeight / 2 - e.pageY) / 40

document.querySelectorAll(".layer").forEach(layer => {

layer.style.transform =
translate(${x}px, ${y}px) scale(1.1)

})

})

</script>

</body>
</html>
