<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HybridAI</title>

<style>

body{
margin:0;
font-family: "Segoe UI", system-ui;
background:#040915;
color:white;
overflow-x:hidden;
}

/* -------- Aurora Background -------- */

.aurora-background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.aurora{
position:absolute;
width:160%;
height:160%;
filter:blur(120px);
opacity:.45;
mix-blend-mode:screen;
}

.aurora1{
background:radial-gradient(circle at 40% 40%, #7A5FFF, transparent 60%);
animation:flow1 80s ease-in-out infinite alternate;
}

.aurora2{
background:radial-gradient(circle at 60% 60%, #3AA6FF, transparent 60%);
animation:flow2 100s ease-in-out infinite alternate;
}

.aurora3{
background:radial-gradient(circle at 50% 20%, #3DFFB3, transparent 60%);
animation:flow3 120s ease-in-out infinite alternate;
}

@keyframes flow1{
0%{transform:translate(-10%,-10%) scale(1);}
50%{transform:translate(5%,10%) scale(1.2);}
100%{transform:translate(-5%,5%) scale(1.1);}
}

@keyframes flow2{
0%{transform:translate(10%,-5%) scale(1.1);}
50%{transform:translate(-10%,10%) scale(1.3);}
100%{transform:translate(5%,-10%) scale(1.2);}
}

@keyframes flow3{
0%{transform:translate(-5%,5%) scale(1.2);}
50%{transform:translate(10%,-10%) scale(1.4);}
100%{transform:translate(-10%,10%) scale(1.3);}
}

/* -------- Layout -------- */

.container{
padding:40px;
text-align:center;
}

.title{
font-size:40px;
font-weight:600;
letter-spacing:1px;
}

.subtitle{
opacity:.8;
margin-bottom:40px;
}

/* -------- Buttons -------- */

.actions{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

button{
padding:14px 24px;
border-radius:14px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
color:white;
font-size:15px;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 0 20px rgba(122,95,255,.5);
}

/* -------- Cards -------- */

.cards{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
width:220px;
padding:22px;
border-radius:16px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(12px);
}

.card h3{
margin:0;
font-size:16px;
opacity:.7;
}

.value{
font-size:30px;
margin-top:8px;
}

/* -------- Upload -------- */

.upload{
margin:auto;
width:520px;
max-width:90%;
padding:30px;
border-radius:16px;
border:2px dashed rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
cursor:pointer;
margin-bottom:40px;
}

.upload:hover{
border-color:#7A5FFF;
}

/* -------- Workspace -------- */

.workspace{
width:800px;
max-width:95%;
margin:auto;
padding:30px;
border-radius:18px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(14px);
text-align:left;
}

.workspace h2{
margin-top:0;
font-weight:500;
}

.log{
margin-top:15px;
height:150px;
overflow:auto;
font-size:14px;
background:rgba(0,0,0,.4);
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="aurora-background">
<div class="aurora aurora1"></div>
<div class="aurora aurora2"></div>
<div class="aurora aurora3"></div>
</div>

<div class="container">

<div class="title">HybridAI</div>
<div class="subtitle">Chronology Builder & Analyzer</div>

<div class="actions">

<button onclick="buildChronology()">Build Chronology</button>
<button onclick="rnReview()">Request RN Review</button>
<button onclick="exportCase()">Ready for Export</button>

</div>

<div class="cards">

<div class="card">
<h3>Case Status</h3>
<div id="status" class="value">Idle</div>
</div>

<div class="card">
<h3>High Risk Items</h3>
<div id="risk" class="value">0</div>
</div>

<div class="card">
<h3>Cases Uploaded</h3>
<div id="cases" class="value">0</div>
</div>

</div>

<div class="upload" onclick="uploadFiles()">
Drag & Drop or Click to Upload Medical Records
<input type="file" id="fileInput" multiple accept=".pdf" hidden>
</div>

<div class="workspace">

<h2>Chronology Builder Workspace</h2>

<div class="log" id="log">
HybridAI system ready...
</div>

</div>

</div>

<script>

let caseCount=0
let risks=0

function log(msg){
let box=document.getElementById("log")
box.innerHTML += "<br>"+msg
box.scrollTop=box.scrollHeight
}

function uploadFiles(){
document.getElementById("fileInput").click()
}

document.getElementById("fileInput").addEventListener("change",e=>{

let files=e.target.files
caseCount += files.length

document.getElementById("cases").innerText=caseCount
document.getElementById("status").innerText="Records Uploaded"

log(files.length+" records uploaded")

})

function buildChronology(){

if(caseCount===0){
log("Upload records first")
return
}

document.getElementById("status").innerText="Analyzing"

log("HybridAI analyzing records...")

setTimeout(()=>{

risks=Math.floor(Math.random()*5)

document.getElementById("risk").innerText=risks
document.getElementById("status").innerText="Chronology Built"

log("Chronology analysis complete")

if(risks>0){
log(risks+" potential risk items detected")
}

},2500)

}

function rnReview(){

document.getElementById("status").innerText="RN Review Requested"

log("Case sent to RN review")

}

function exportCase(){

document.getElementById("status").innerText="Exporting"

log("Preparing export package")

setTimeout(()=>{

document.getElementById("status").innerText="Ready"

log("Export complete")

},2000)

}

</script>

</body>
</html>
