<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HybridAI – Chronology Builder & Analyzer</title>
<style>

/* ---------------- Body ---------------- */
body{
margin:0;
font-family:"Segoe UI", system-ui, sans-serif;
background:#040915;
color:white;
overflow-x:hidden;
}

/* ---------------- Aurora ---------------- */
.aurora-sky{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
background:#040915;
}

.aurora-layer{
position:absolute;
width:200%;
height:200%;
filter:blur(80px);
opacity:.45;
mix-blend-mode:screen;
}

.aurora-purple{
background:linear-gradient(120deg, transparent 20%, #7A5FFF 40%, transparent 60%);
animation:auroraMove1 70s ease-in-out infinite alternate;
}

.aurora-blue{
background:linear-gradient(140deg, transparent 25%, #3AA6FF 50%, transparent 70%);
animation:auroraMove2 90s ease-in-out infinite alternate;
}

.aurora-green{
background:linear-gradient(160deg, transparent 30%, #3DFFB3 55%, transparent 75%);
animation:auroraMove3 110s ease-in-out infinite alternate;
}

@keyframes auroraMove1{
0%{transform:translate(-20%,-10%) rotate(-5deg);}
50%{transform:translate(10%,5%) rotate(5deg);}
100%{transform:translate(-10%,10%) rotate(-3deg);}
}

@keyframes auroraMove2{
0%{transform:translate(10%,-15%) rotate(6deg);}
50%{transform:translate(-15%,5%) rotate(-6deg);}
100%{transform:translate(5%,10%) rotate(4deg);}
}

@keyframes auroraMove3{
0%{transform:translate(-10%,10%) rotate(-4deg);}
50%{transform:translate(15%,-10%) rotate(6deg);}
100%{transform:translate(-5%,5%) rotate(-5deg);}
}

/* ---------------- Layout ---------------- */
.container{
padding:40px;
text-align:center;
max-width:1200px;
margin:auto;
}

/* ---------------- Header ---------------- */
.title{
font-size:44px;
font-weight:700;
letter-spacing:1px;
}

.subtitle{
font-size:18px;
opacity:.75;
margin-bottom:50px;
}

/* ---------------- Buttons ---------------- */
.actions{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:50px;
}

button{
padding:16px 28px;
border-radius:16px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 0 25px rgba(122,95,255,.6);
}

/* ---------------- Cards ---------------- */
.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-bottom:50px;
}

.card{
width:220px;
padding:26px;
border-radius:18px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(12px);
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(61,255,179,.3);
}

.card h3{
margin:0;
font-size:16px;
opacity:.7;
}

.value{
font-size:32px;
margin-top:10px;
font-weight:600;
}

/* ---------------- Upload ---------------- */
.upload{
margin:auto;
width:540px;
max-width:90%;
padding:32px;
border-radius:18px;
border:2px dashed rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
cursor:pointer;
margin-bottom:50px;
transition:.3s;
font-size:16px;
}

.upload:hover{
border-color:#7A5FFF;
background:rgba(255,255,255,.06);
}

/* ---------------- Workspace ---------------- */
.workspace{
width:850px;
max-width:95%;
margin:auto;
padding:32px;
border-radius:20px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(14px);
text-align:left;
}

.workspace h2{
margin-top:0;
font-weight:500;
}

.log{
margin-top:18px;
height:180px;
overflow:auto;
font-size:14px;
background:rgba(0,0,0,.4);
padding:15px;
border-radius:12px;
}

</style>
</head>
<body>

<!-- Aurora Background -->
<div class="aurora-sky">
<div class="aurora-layer aurora-purple"></div>
<div class="aurora-layer aurora-blue"></div>
<div class="aurora-layer aurora-green"></div>
</div>

<div class="container">

<div class="title">HybridAI</div>
<div class="subtitle">Chronology Builder & Analyzer</div>

<!-- Action Buttons -->
<div class="actions">
<button onclick="buildChronology()">Build Chronology</button>
<button onclick="rnReview()">Request RN Review</button>
<button onclick="exportCase()">Ready for Export</button>
</div>

<!-- Status Cards -->
<div class="cards">
<div class="card">
<h3>Case Status</h3>
<div id="status" class="value">Idle</div>
</div>
