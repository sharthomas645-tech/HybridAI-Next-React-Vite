<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HybridAI Medical Chronology & Analyzer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(180deg, rgba(30, 80, 200, 0.8), rgba(96, 165, 250, 0.8));
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
        }
        .logo {
            font-size: 24px;
            line-height: 1.2;
            margin: 0;
        }
        .login {
            margin: 20px;
            display: flex;
            flex-direction: column;
        }
        .dashboard {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">H<em>ybridAI</em></h1>
        <div class="login">
            <input type="text" placeholder="Email" required />
            <input type="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </div>
    </div>
    <div class="dashboard">
        <h2>Dashboard</h2>
        <div class="controls">
            <button>Upload PDF</button>
            <button>Build Chronology</button>
            <button>RN Review Request</button>
            <button>Export File</button>
        </div>
        <h3>Case Management</h3>
        <div class="timeline">
            <p>Chronology Timeline</p>
        </div>
        <div class="metrics-bar">
            <p>Metrics Bar</p>
        </div>
    </div>

</html>
