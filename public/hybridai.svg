<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Blue gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0d1a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051533;stop-opacity:1" />
    </linearGradient>
    <!-- H logo gradient -->
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b5ea7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0c8ff;stop-opacity:1" />
    </linearGradient>
    <!-- Aurora wave gradient 1 -->
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e50c8;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#3c14b4;stop-opacity:0.4" />
      <stop offset="60%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e50c8;stop-opacity:0" />
    </linearGradient>
    <!-- Aurora wave gradient 2 -->
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6432dc;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#50b4f0;stop-opacity:0.3" />
      <stop offset="70%" style="stop-color:#a050dc;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#6432dc;stop-opacity:0" />
    </linearGradient>
    <!-- Glow filter for H logo -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for aurora -->
    <filter id="auroraGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect width="800" height="200" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Aurora wave layers (clipped to rounded rect) -->
  <g clip-path="url(#roundedRect)">
    <!-- Aurora wave 1 -->
    <path d="M-50,140 Q100,100 200,130 Q350,165 500,110 Q650,55 850,100 L850,200 L-50,200 Z"
          fill="url(#aurora1)" filter="url(#auroraGlow)" opacity="0.7"/>
    <!-- Aurora wave 2 -->
    <path d="M-50,160 Q150,120 300,150 Q450,180 600,130 Q720,90 850,125 L850,200 L-50,200 Z"
          fill="url(#aurora2)" filter="url(#auroraGlow)" opacity="0.6"/>
    <!-- Aurora wave 3 subtle highlight -->
    <path d="M-50,150 Q200,110 350,140 Q500,170 650,120 Q760,85 850,115 L850,200 L-50,200 Z"
          fill="none" stroke="rgba(100,180,255,0.2)" stroke-width="1.5"/>
  </g>

  <!-- Stylized H logo mark -->
  <g transform="translate(38, 30)" filter="url(#glow)">
    <!-- Left vertical bar of H -->
    <rect x="0" y="0" width="18" height="140" rx="4" fill="url(#hGrad)"/>
    <!-- Right vertical bar of H -->
    <rect x="46" y="0" width="18" height="140" rx="4" fill="url(#hGrad)"/>
    <!-- Crossbar of H -->
    <rect x="0" y="54" width="64" height="18" rx="4" fill="url(#hGrad)" opacity="0.9"/>
    <!-- Flowing accent lines (aurora-style curves) -->
    <path d="M8,10 Q32,30 56,15" fill="none" stroke="rgba(100,200,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8,125 Q32,108 56,120" fill="none" stroke="rgba(160,100,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- HybridAI title text -->
  <text x="130" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700"
        letter-spacing="2" fill="url(#textGrad)">HybridAI</text>

  <!-- Trademark symbol -->
  <text x="498" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400"
        fill="rgba(160,200,255,0.85)">™</text>

  <!-- Subtitle text -->
  <text x="130" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="300"
        letter-spacing="1.5" fill="rgba(160,200,255,0.8)">Medical Chronology &amp; Analyzer Intelligence System</text>

  <!-- Subtle bottom accent line -->
  <line x1="130" y1="145" x2="670" y2="145" stroke="rgba(74,158,255,0.3)" stroke-width="1"/>
</svg>
