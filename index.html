<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:#020617;
color:white;
overflow-x:hidden;
}

/* Aurora Layer */

.aurora{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
filter:blur(60px);
opacity:.8;
}

.aurora span{
position:absolute;
width:60vw;
height:60vh;
border-radius:50%;
animation:swirl 25s linear infinite;
}

.aurora span:nth-child(1){
background:#4cc9f0;
top:10%;
left:10%;
}

.aurora span:nth-child(2){
background:#7209b7;
top:50%;
left:40%;
animation-duration:35s;
}

.aurora span:nth-child(3){
background:#4361ee;
top:30%;
left:70%;
animation-duration:45s;
}

@keyframes swirl{
0%{
transform:rotate(0deg) translateX(0px);
}
50%{
transform:rotate(180deg) translateX(120px);
}
100%{
transform:rotate(360deg) translateX(0px);
}
}

/* Header */

.header{
text-align:center;
padding-top:40px;
}

.logo{
font-size:48px;
font-weight:700;
background:linear-gradient(90deg,#4cc9f0,#7209b7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 25px rgba(100,160,255,.8);
}

.subtitle{
font-size:20px;
opacity:.85;
margin-top:6px;
}

/* Main Panel */

.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(18px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
}

/* Buttons */

.button-row{
display:flex;
gap:20px;
margin-bottom:40px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;

background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;

box-shadow:0 0 15px rgba(120,120,255,.5);
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(150,130,255,1);
}

/* Cards */

.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.card h3{
color:#9fb7ff;
margin-bottom:15px;
}

/* Case Status */

.status span{
display:block;
padding:6px;
margin:5px 0;
border-radius:6px;
color:#8fb6ff;
}

/* Active Status Glow */

.active{
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(130,130,255,.9);
}

/* Metrics */

.metric{
font-size:40px;
font-weight:700;
text-align:center;
margin-top:10px;
}

.alert{
color:#ff4d6d;
}

</style>
</head>

<body>

<div class="aurora">
<span></span>
<span></span>
<span></span>
</div>

<div class="header">
<div class="logo">HybridAI</div>
<div class="subtitle">Medical Chronology Builder & Analyzer</div>
</div>

<div class="panel">

<div class="button-row">
<button>Upload PDF</button>
<button>Build Chronology</button>
<button>RN Review Request</button>
<button>Export Files</button>
</div>

<div class="cards">

<div class="card">
<h3>Case Status</h3>

<div class="status">
<span class="active">Uploaded</span>
<span>Processing</span>
<span>Under RN Review</span>
<span>Ready for Export</span>
</div>

</div>

<div class="card">
<h3>High-Risk Alerts</h3>
<div class="metric alert">2</div>
</div>

<div class="card">
<h3>Cases Uploaded</h3>
<div class="metric">5</div>
</div>

</div>

</div>

</body>
</html>
