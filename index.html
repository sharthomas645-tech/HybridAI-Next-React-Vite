<html>
<head>
    <title>HybridAI Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="dashboard.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to the HybridAI Dashboard</h1>
        <nav>
            <ul>
                <li><a href="#metrics">Metrics</a></li>
                <li><a href="#case-management">Case Management</a></li>
                <li><a href="#timeline">Timeline</a></li>
            </ul>
        </nav>
    </header>
    <section id="login">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </section>
    <section id="metrics">
        <h2>Metrics</h2>
        <div class="metric">
            <h3>Metric 1</h3>
            <p>Data 1</p>
        </div>
        <div class="metric">
            <h3>Metric 2</h3>
            <p>Data 2</p>
        </div>
    </section>
    <section id="case-management">
        <h2>Case Management</h2>
        <div>
            <p>Manage your cases here.</p>
        </div>
    </section>
    <section id="timeline">
        <h2>Timeline</h2>
        <div>
            <p>View your timeline here.</p>
        </div>
    </section>
    <footer>
        <p>Copyright © 2026 HybridAI</p>
    </footer>
</body>
</html>
