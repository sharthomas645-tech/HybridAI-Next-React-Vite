<!DOCTYPE html>
<html>
<head>
<title>HybridAI Dashboard</title>
<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
overflow:hidden;
background:#020617;
color:white;
}

/* Canvas for aurora and water */
#auroraCanvas {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* Header */
.header{
text-align:center;
padding-top:40px;
}

.logoText{
font-size:60px;
font-weight:700;
background:linear-gradient(90deg,#4cc9f0,#7209b7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 35px rgba(100,160,255,.9);
}

.subtitle{
font-size:24px;
opacity:.85;
margin-top:10px;
}

/* Main Panel */
.panel{
max-width:1100px;
margin:40px auto;
background:rgba(255,255,255,.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(18px);
box-shadow:0 15px 50px rgba(0,0,0,.6);
}

/* Buttons */
.button-row{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}

button{
flex:1;
padding:18px;
min-width:150px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(120,120,255,.5);
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(150,130,255,1);
}

/* Cards */
.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(76,201,240,0.2);
text-align:center;
}

.card h3{
font-size:24px;
color:#9fb7ff;
margin-bottom:20px;
}

/* Case Status */
.status span{
display:block;
padding:10px;
margin:8px 0;
border-radius:8px;
font-size:18px;
color:#8fb6ff;
}

/* Active Status Glow */
.active{
background:linear-gradient(90deg,#4361ee,#7209b7);
color:white;
box-shadow:0 0 15px rgba(130,130,255,.9);
}

/* Metrics */
.metric{
font-size:50px;
font-weight:700;
text-align:center;
margin-top:10px;
}

.alert{
color:#ff4d6d;
}
</style>
</head>
<body>

<canvas id="auroraCanvas"></canvas>

<!-- Background Water Sound -->
<audio id="waterSound" autoplay loop>
<source src="soft_water.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>

<div class="header">
<div class="logoText">HybridAI</div>
<div class="subtitle">Medical Chronology Builder & Analyzer</div>
</div>

<div class="panel">

<div class="button-row">
<button id="uploadBtn">Upload PDF</button>
<button id="buildChronBtn">Build Chronology</button>
<button id="rnReviewBtn">RN Review Request</button>
<button id="exportBtn">Export Files</button>
</div>

<div class="cards">

<div class="card">
<h3>Case Status</h3>
<div class="status">
<span class="active">Uploaded</span>
<span>Processing</span>
<span>Under RN Review</span>
<span>Ready for Export</span>
</div>
</div>

<div class="card">
<h3>High-Risk Alerts</h3>
<div class="metric alert" id="highRisk">2</div>
</div>

<div class="card">
<h3>Cases Uploaded</h3>
<div class="metric" id="casesUploaded">5</div>
</div>

</div>
</div>

<script>
// ===== Aurora + Water Canvas =====
const canvas = document.getElementById("auroraCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Aurora layers
const layers = [];
for(let i=0;i<8;i++){
layers.push({
y: Math.random()*height*0.6,
amplitude: 80 + Math.random()*50,
wavelength: 300 + Math.random()*200,
speed: 0.00005 + Math.random()*0.00008, // very slow
phase: Math.random()*Math.PI*2,
color1: `rgba(76,201,240,0.12)`,
color2: `rgba(114,9,183,0.12)`,
color3: `rgba(0,255,204,0.12)`
});
});

let pulse = 0;

function drawAurora(){
ctx.clearRect(0,0,width,height);

layers.forEach(layer=>{
// Draw aurora curtain as soft polygon
ctx.beginPath();
for(let x=0;x<width;x++){
let y = layer.y + Math.sin((x/layer.wavelength)+layer.phase + Date.now()*layer.speed)*layer.amplitude;
if(x===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.lineTo(width,height);
ctx.lineTo(0,height);
ctx.closePath();
const grad = ctx.createLinearGradient(0,0,0,height);
grad.addColorStop(0,layer.color1.replace("0.12",0.12+0.2*pulse));
grad.addColorStop(0.5,layer.color2.replace("0.12",0.12+0.2*pulse));
grad.addColorStop(1,layer.color3.replace("0.12",0.12+0.2*pulse));
ctx.fillStyle = grad;
ctx.fill();
});

pulse *= 0.95;
requestAnimationFrame(drawAurora);
}

drawAurora();

window.addEventListener('resize', ()=>{
width = canvas.width = window.innerWidth;
height = canvas.height = window.innerHeight;
});

// ===== Buttons logic =====
let uploadedCases = 5;
const waterAudio = document.getElementById('waterSound');
waterAudio.volume = 0.15;

function handleClick(action){
pulse = 1; // gentle aurora pulse
waterAudio.volume = 0.2;
setTimeout(()=>waterAudio.volume = 0.15,800);

switch(action){
case 'upload':
uploadedCases++;
document.getElementById('casesUploaded').innerText = uploadedCases;
alert('PDF uploaded! Total: '+uploadedCases);
break;
case 'chron':
alert('Chronology built!');
break;
case 'rn':
alert('RN Review Request sent!');
break;
case 'export':
alert('Files ready for export!');
break;
}
}

['uploadBtn','buildChronBtn','rnReviewBtn','exportBtn'].forEach(id=>{
document.getElementById(id).addEventListener('click', ()=>{
handleClick(id);
});
});
</script>

</body>
</html>
