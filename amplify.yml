version: 1
backend:
  phases:
    pre_build:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npx tsc --noEmit -p amplify/backend/functions/AttorneyUploadAPI/tsconfig.json || true
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
